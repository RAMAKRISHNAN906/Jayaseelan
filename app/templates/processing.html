<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GaitAnalysis Pro - Processing</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>

<nav class="navbar-premium">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="{{ url_for('dashboard') }}" class="navbar-brand-text d-flex align-items-center gap-2" style="text-decoration:none;">
      <span style="
        width:34px; height:34px;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        border-radius:9px;
        display:flex; align-items:center; justify-content:center;
        font-size:1.1rem; color:#fff;
        box-shadow:0 4px 14px rgba(124,58,237,0.45);
        flex-shrink:0;
      ">
        <i class="fa-solid fa-brain"></i>
      </span>
      GaitAnalysis Pro
    </a>
    <a href="{{ url_for('logout') }}" class="btn-ghost" style="padding:7px 16px; font-size:0.82rem;">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      Logout
    </a>
  </div>
</nav>

<div class="container" style="max-width:860px; padding:56px 0 70px;">
  <div class="glass-card animate-fade">
    <div class="section-title">
      <div class="title-icon"><i class="fa-solid fa-gears"></i></div>
      Background Extraction In Progress
    </div>

    <div class="analysis-loader" id="processingBox" style="align-items:center;">
      <div class="loader-spinner"></div>
      <div class="loader-text" id="statusText">Uploading and extracting gait frames...</div>
      <div style="font-size:0.78rem; color:#8f89ba; text-align:center;">
        You can move this tab to background. Extraction continues on the server.
      </div>
    </div>

    <div class="divider"></div>

    <div class="row g-3" style="font-size:0.86rem;">
      <div class="col-sm-6">
        <div class="form-label" style="margin-bottom:5px;">Task Type</div>
        <div style="color:#c4b5fd; font-weight:600; text-transform:capitalize;">{{ task_type }} task</div>
      </div>
      <div class="col-sm-6">
        <div class="form-label" style="margin-bottom:5px;">File</div>
        <div style="color:#a8a3cc; word-break:break-all;">{{ file_name }}</div>
      </div>
      <div class="col-12">
        <div class="form-label" style="margin-bottom:5px;">Job ID</div>
        <div style="color:#6b6891; font-family:monospace;">{{ job_id }}</div>
      </div>
    </div>

    <div id="errorBox" class="alert alert-danger d-none mt-3" role="alert"></div>

    <div class="mt-4 d-flex gap-2">
      <a href="{{ url_for('dashboard') }}" class="btn-ghost">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Dashboard
      </a>
    </div>
  </div>
</div>

<script>
  const statusUrl = "{{ url_for('predict_status', job_id=job_id) }}";
  const fallbackResultUrl = "{{ url_for('predict_result', job_id=job_id) }}";
  const statusText = document.getElementById('statusText');
  const errorBox = document.getElementById('errorBox');

  let pollTimer = null;
  let inFlight = false;

  function showError(message) {
    errorBox.textContent = message || 'Video extraction failed. Please retry.';
    errorBox.classList.remove('d-none');
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
    statusText.textContent = 'Processing stopped due to an error.';
  }

  async function checkStatus() {
    if (inFlight) return;
    inFlight = true;

    try {
      const response = await fetch(statusUrl, { cache: 'no-store' });
      const data = await response.json().catch(() => ({}));

      if (!response.ok || !data.success) {
        showError(data.message || 'Unable to read extraction status.');
        return;
      }

      if (data.status === 'done') {
        window.location.assign(data.result_url || fallbackResultUrl);
        return;
      }

      if (data.status === 'error') {
        showError(data.error || 'Video extraction failed.');
        return;
      }

      if (data.status === 'processing') {
        statusText.textContent = 'Extraction running in background...';
      } else {
        statusText.textContent = 'Job queued. Starting extraction...';
      }
    } catch (err) {
      showError('Network error while checking extraction status.');
    } finally {
      inFlight = false;
    }
  }

  function startPolling() {
    checkStatus();
    pollTimer = setInterval(checkStatus, 2000);
  }

  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) {
      checkStatus();
    }
  });

  window.addEventListener('focus', checkStatus);
  startPolling();
</script>

</body>
</html>
