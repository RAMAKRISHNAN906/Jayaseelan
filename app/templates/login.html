<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GaitAnalysis Pro — Sign In</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />

  <style>
    body {
      background-color: #0d0d1a;
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 0%,   rgba(124,58,237,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 100%,  rgba(79,70,229,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%,   rgba(109,40,217,0.07) 0%, transparent 70%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
  </style>
</head>
<body>

<div class="auth-card animate-fade">

  <!-- Logo -->
  <div class="auth-logo">
    <i class="fa-solid fa-brain"></i>
  </div>

  <!-- Title -->
  <h1 class="auth-title">Welcome Back</h1>
  <p class="auth-sub">Sign in to access your gait analysis dashboard</p>

  <!-- Error / Success alerts -->
  <div id="authError"   class="alert-danger   mb-3" style="display:none;">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="authErrorMsg">An error occurred.</span>
  </div>
  <div id="authSuccess" class="alert-success  mb-3" style="display:none;">
    <i class="fa-solid fa-circle-check"></i>
    <span id="authSuccessMsg">Login successful. Redirecting…</span>
  </div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="doLogin(event)" novalidate>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <div class="input-group">
        <span class="input-group-text">
          <i class="fa-regular fa-envelope"></i>
        </span>
        <input
          type="email"
          class="form-control"
          id="emailInput"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>
    </div>

    <!-- Password -->
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text">
          <i class="fa-solid fa-lock"></i>
        </span>
        <input
          type="password"
          class="form-control"
          id="passwordInput"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-premium w-100" id="loginBtn" style="padding:13px; font-size:0.95rem;">
      <span id="loginBtnContent" class="d-flex align-items-center justify-content-center gap-2">
        <i class="fa-solid fa-right-to-bracket"></i>
        Sign In
      </span>
    </button>

  </form>

  <!-- Register link -->
  <div style="text-align:center; margin-top:22px; font-size:0.84rem; color:#6b6891;">
    Don't have an account?
    <a href="{{ url_for('register') }}" style="color:#a78bfa; font-weight:600; text-decoration:none;">
      Create one
    </a>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Firebase Compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  /* ----------------------------------------------------------------
     Firebase initialisation
     ---------------------------------------------------------------- */
  const firebaseConfig = {{ firebase_config | tojson }};
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  /* ----------------------------------------------------------------
     UI Helpers
     ---------------------------------------------------------------- */
  function showError(msg) {
    document.getElementById('authError').style.display    = 'flex';
    document.getElementById('authSuccess').style.display  = 'none';
    document.getElementById('authErrorMsg').textContent   = msg;
  }

  function showSuccess(msg) {
    document.getElementById('authSuccess').style.display  = 'flex';
    document.getElementById('authError').style.display    = 'none';
    document.getElementById('authSuccessMsg').textContent = msg;
  }

  function setLoading(loading) {
    const btn     = document.getElementById('loginBtn');
    const content = document.getElementById('loginBtnContent');
    btn.disabled  = loading;
    content.innerHTML = loading
      ? '<span style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite;"></span>&nbsp; Signing in…'
      : '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
  }

  /* ----------------------------------------------------------------
     Friendly error messages
     ---------------------------------------------------------------- */
  function friendlyError(code) {
    const map = {
      'auth/user-not-found':       'No account found with this email address.',
      'auth/wrong-password':       'Incorrect password. Please try again.',
      'auth/invalid-email':        'Please enter a valid email address.',
      'auth/too-many-requests':    'Too many failed attempts. Please try again later.',
      'auth/user-disabled':        'This account has been disabled.',
      'auth/invalid-credential':   'Invalid credentials. Please check your email and password.',
      'auth/network-request-failed': 'Network error. Please check your connection.'
    };
    return map[code] || 'Authentication failed. Please try again.';
  }

  /* ----------------------------------------------------------------
     doLogin
     ---------------------------------------------------------------- */
  async function doLogin(e) {
    e.preventDefault();

    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    setLoading(true);
    document.getElementById('authError').style.display   = 'none';
    document.getElementById('authSuccess').style.display = 'none';

    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const idToken = await userCredential.user.getIdToken();

      // Exchange token for session cookie
      const resp = await fetch('/session_login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });

      const data = await resp.json();

      if (resp.ok) {
        showSuccess('Login successful. Redirecting…');
        setTimeout(() => {
          window.location.href = data.redirect || '/dashboard';
        }, 600);
      } else {
        setLoading(false);
        showError(data.error || 'Session creation failed. Please try again.');
      }
    } catch (err) {
      setLoading(false);
      showError(friendlyError(err.code));
    }
  }
</script>

</body>
</html>
