<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroCare — Error</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { margin:0; background:#030a19; color:#ecf4ff; font-family:Manrope,sans-serif;
           display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:20px; }
    .box { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.3);
           border-radius:18px; padding:32px 36px; max-width:540px; width:90%; }
    h2 { margin:0 0 12px; color:#f87171; font-size:1.3rem; }
    pre { background:rgba(0,0,0,0.4); border-radius:10px; padding:14px; font-size:0.78rem;
          color:#fca5a5; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
    a { display:inline-block; margin-top:16px; padding:10px 20px; border-radius:12px;
        background:linear-gradient(135deg,#0ea5e9,#0f766e); color:#fff;
        text-decoration:none; font-weight:700; font-size:0.88rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>⚠ Processing Error</h2>
    <p style="color:#94b8de;margin:0 0 14px;font-size:0.88rem;">The video could not be analysed. Please try again with a different video.</p>
    <pre>{{ error }}</pre>
    <a href="/clinical-data">← Try Again</a>
  </div>
</body>
</html>
